<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthDCAT-AP Metadata Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">⚕</span>
        <div>
          <div class="logo-text">HealthDCAT-AP Editor</div>
          <div class="logo-sub">EHDS Metadata Editor · v6</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="save-btn" class="btn-outline" title="Save your progress locally">Save Draft</button>
        <button id="load-btn" class="btn-outline" title="Load a previously saved draft">Load Draft</button>
      </div>
    </div>
  </header>

  <div class="progress-bar">
    <div class="progress-steps" id="progress-steps">
      <!-- Rendered by JS -->
    </div>
  </div>

  <div class="error-banner" id="error-banner" role="alert"></div>

  <main>
    <div id="step-container">
      <!-- Step content rendered by JS -->
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <div class="footer-nav">
      <button id="back-btn" class="btn-secondary" disabled>&#8592; Back</button>
      <span class="step-info" id="step-info"></span>
      <button id="next-btn" class="btn-primary">Next &#8594;</button>
    </div>
  </footer>

  <script src="js/vocabularies.js"></script>
  <script src="js/ttl-generator.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
